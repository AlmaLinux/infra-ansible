---
# Deploy the fan-out trigger script and systemd unit on repo.almalinux.org.
# ALBS (or any automation) starts this unit after pushing new content. The
# script SSHes to each tier0 rsync server, touches a sync-requested flag, and
# kicks mirror-pull.service. The flag-file + re-check loop in mirror-pull.py
# ensures no trigger is lost even when syncs overlap.

- name: Install repo-alma-sync trigger script
  ansible.builtin.template:
    src: repo-alma-sync.sh.j2
    dest: /usr/local/bin/repo-alma-sync.sh
    owner: root
    group: root
    mode: "0755"
  tags:
    - sync_trigger

- name: Install rsync-repo-alma.service systemd unit
  ansible.builtin.template:
    src: rsync-repo-alma.service.j2
    dest: /etc/systemd/system/rsync-repo-alma.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  tags:
    - sync_trigger
