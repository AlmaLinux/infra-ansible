---
- name: Ensure Caddy is stopped and disabled
  ansible.builtin.systemd:
    name: caddy.service
    state: stopped
    enabled: false
  failed_when: false
  tags:
    - nginx

- name: Install nginx and brotli module
  ansible.builtin.dnf:
    name:
      - nginx
      - nginx-mod-brotli
    state: present
  tags:
    - nginx

- name: Gather package facts for nginx version check
  ansible.builtin.package_facts:
    manager: auto
  tags:
    - nginx

- name: Distribute /etc/nginx/nginx.conf
  ansible.builtin.template:
    src: nginx/nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload nginx
  tags:
    - nginx

- name: Check for Let's Encrypt certificates
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ item.name }}/fullchain.pem
  loop: "{{ almalinux_repo_vhosts }}"
  register: almalinux_repo_le_cert_check
  tags:
    - nginx

- name: Distribute vhost configuration files
  ansible.builtin.template:
    src: nginx/vhost.conf.j2
    dest: /etc/nginx/conf.d/{{ vhost.name }}.conf
    mode: "0644"
    owner: root
    group: root
  loop: "{{ almalinux_repo_le_cert_check.results }}"
  vars:
    vhost: "{{ item.item }}"
    _ssl_cert_path: "{{ '/etc/letsencrypt/live/' ~ item.item.name if item.stat.exists else '/etc/pki/nginx/' ~ item.item.name }}"
  notify: Reload nginx
  tags:
    - nginx

- name: Remove default nginx site configuration
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload nginx
  tags:
    - nginx

- name: Start/Enable nginx
  ansible.builtin.systemd:
    name: nginx.service
    state: started
    enabled: true
  tags:
    - nginx
