---
- name: Create AWS config dir
  ansible.builtin.file:
    path: /root/.aws
    state: directory
    mode: "0700"

- name: Write AWS config file
  vars:
    aws_access_key_id: "{{ almalinux_repo_route53_access_key }}"
    aws_secret_access_key: "{{ almalinux_repo_route53_secret_key }}"
  ansible.builtin.template:
    src: aws_config.j2
    dest: /root/.aws/config
    mode: "0600"
