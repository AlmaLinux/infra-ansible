---
mirror_tier0: false
mirror_cloudflare_propagation_seconds: 30
mirror_extra_domains: []
mirror_path: /mirror
# use a /almalinux subdir within mirror_path if true
mirror_path_use_subdir: true

# inspiration from https://github.com/PhirePhly/micromirrors/blob/main/files/sysctl.performancetune.conf
mirror_sysctl_performance:
  - name: net.core.default_qdisc
    value: fq_codel
  - name: net.ipv4.tcp_congestion_control
    value: bbr
  - name: net.core.rmem_max
    value: 134217728
  - name: net.core.wmem_max
    value: 134217728
  - name: net.ipv4.tcp_rmem
    value: 4096 87380 67108864
  - name: net.ipv4.tcp_wmem
    value: 4096 87380 67108864
  - name: net.ipv4.tcp_mtu_probing
    value: 1
  - name: net.ipv4.tcp_fastopen
    value: 1
  - name: net.ipv4.tcp_no_metrics_save
    value: 1
  - name: net.ipv4.tcp_slow_start_after_idle
    value: 0
  - name: net.ipv4.tcp_notsent_lowat
    value: 1048576

mirror_create_fs: true

mirror_enable_http: true

mirror_enable_kitten: false

mirror_repos:
  - mirror_name: almalinux
    bootstrap_command:
      "/usr/bin/rsync -avSH --exclude='.~tmp~' rsync://rsync.repo.almalinux.org/almalinux/TIME
      {{ mirror_path }}{% if mirror_path_use_subdir %}/almalinux/{% endif %}"
    creates: "{{ mirror_path }}{% if mirror_path_use_subdir %}/almalinux{% endif %}/TIME"
    rsync_command:
      "sleep $(((RANDOM\\%3500)+1)) && /usr/bin/flock -n /var/run/almalinux_rsync.lock -c
      \"/usr/bin/rsync -avSH --exclude='.~tmp~' --delete-delay --delay-updates
      rsync://rsync.repo.almalinux.org/almalinux/ {{ mirror_path }}{% if mirror_path_use_subdir %}/almalinux/{% endif %}\""
    rsync_name: mirror_rsync
    rsync_user: root
    rsync_minute: "0"
    rsync_hour: "*/1"
    rsync_file: almalinux_rsync

mirror_kitten_repos:
  - mirror_name: almalinux-kitten
    bootstrap_command:
      "/usr/bin/rsync -avSH --exclude='.~tmp~' rsync://rsync.repo.almalinux.org/almalinux-kitten/RPM-GPG-KEY-AlmaLinux-10
      {{ mirror_path }}{% if mirror_path_use_subdir %}/almalinux-kitten/{% endif %}"
    creates: "{{ mirror_path }}{% if mirror_path_use_subdir %}/almalinux-kitten{% endif %}/RPM-GPG-KEY-AlmaLinux-10"
    rsync_command:
      "sleep $(((RANDOM\\%3500)+1)) && /usr/bin/flock -n /var/run/almalinux-kitten_rsync.lock -c
      \"/usr/bin/rsync -avSH --exclude='.~tmp~' --delete-delay --delay-updates
      rsync://rsync.repo.almalinux.org/almalinux-kitten/ {{ mirror_path }}/almalinux-kitten/\""
    rsync_name: mirror_rsync_kitten
    rsync_user: root
    rsync_minute: "0"
    rsync_hour: "*/1"
    rsync_file: almalinux-kitten_rsync

mirror_bootstrap_mirror: true
mirror_configure_crons: true

mirror_rsync_modules:
  almalinux:
    path: "{{ mirror_path }}/almalinux"
    comment: AlmaLinux repository

mirror_kitten_rsync_modules:
  almalinux-kitten:
    path: "{{ mirror_path }}/almalinux-kitten"
    comment: AlmaLinux Kitten repository

# On-demand pull from the upstream raw repo. Only deploy on hosts that act as
# rsync servers (mirrors_tier0); leave disabled on any mirror we manage that
# is not an rsync server, since this role is shared.
mirror_pull_enabled: false
mirror_pull_source_host: raw.repo.almalinux.org
mirror_pull_source_url: "rsync://{{ mirror_pull_source_host }}/"
mirror_pull_rsync_bin: /usr/bin/rsync
mirror_pull_rsync_options:
  - -avAHX
  - --delete-delay
  - --delay-updates
# Patterns appended as --exclude=<pattern> for every repo synced. Per-repo
# excludes (set via the `excludes:` field on a `mirror_pull_repos` entry) are
# merged on top of these.
mirror_pull_excludes:
  - .~tmp~
mirror_pull_script_path: /usr/local/sbin/mirror-pull.py
mirror_pull_lockfile: /var/run/mirror-pull.lock
mirror_pull_service_name: mirror-pull
# Cap on parallel repo syncs within one mirror-pull invocation. 0 means
# "all selected repos in parallel" (one rsync subprocess per repo at once).
# Set to a positive integer to limit upstream/disk/network pressure.
mirror_pull_max_parallel_repos: 0
# Config file the script reads at startup. Generated by this role from the
# variables below; the script itself is static (not templated).
mirror_pull_config_dir: /etc/mirror-pull
mirror_pull_config_file: "{{ mirror_pull_config_dir }}/config.json"
# Pulls of large repos can take a while; allow up to 6 hours by default.
mirror_pull_service_timeout: 6h
# Structured status from the last completed run; the orchestrator on
# {{ mirror_pull_source_host }} can fetch this over SSH to confirm success.
mirror_pull_status_dir: /var/lib/mirror-pull
mirror_pull_status_file: "{{ mirror_pull_status_dir }}/last-run.json"
# Flag file used for the re-sync mechanism. The orchestrator touches this
# before starting the service. If a new flag appears while a sync is running,
# the script re-runs automatically after the current sync completes. This
# prevents lost triggers when ALBS publishes faster than syncs finish.
# Set to empty string to disable the re-check (run once and exit).
mirror_pull_sync_requested_file: "{{ mirror_pull_status_dir }}/sync-requested"
# Repos to pull. Fields:
#   name     — short identifier used for logs and `--repo` filtering
#   src      — module/path on mirror_pull_source_url
#   dest     — local destination directory
#   excludes — optional list of rsync exclude patterns merged with
#              mirror_pull_excludes for this repo only
mirror_pull_repos:
  - name: almalinux
    src: almalinux
    dest: "{{ mirror_path }}/almalinux"
    excludes: []
