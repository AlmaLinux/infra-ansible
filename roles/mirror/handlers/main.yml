---
- name: Reload nginx
  ansible.builtin.systemd_service:
    name: nginx.service
    state: reloaded

- name: Restart nginx
  ansible.builtin.systemd_service:
    name: nginx.service
    state: restarted

- name: Restart rsyncd
  ansible.builtin.systemd_service:
    name: rsyncd.service
    state: restarted
