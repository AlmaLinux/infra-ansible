---
- name: Add rsync backport repo
  ansible.builtin.yum_repository:
    name: backports-rsync
    description: Backported rsync with extra features
    file: backports-rsync
    baseurl: http://repo.almalinux.org/backports/$releasever/$basearch/rsync/
    enabled: true
    gpgcheck: true
    gpgkey: https://repo.almalinux.org/almalinux/RPM-GPG-KEY-AlmaLinux-$releasever

- name: Update rsync # noqa package-latest
  ansible.builtin.package:
    name: rsync
    state: latest

- name: Allow http/https/ssh traffic through firewalld
  ansible.posix.firewalld:
    zone: public
    state: enabled
    permanent: true
    immediate: true
    service: "{{ item }}"
  loop:
    - http
    - https
    - ssh
    - rsyncd
  tags:
    - firewalld

- name: Allow rsyncd traffic through firewalld
  ansible.posix.firewalld:
    zone: public
    state: enabled
    permanent: true
    immediate: true
    service: "{{ item }}"
  loop:
    - rsyncd
  tags:
    - firewalld
  when: mirror_rsync_modules

- name: Create mirror directory
  ansible.builtin.file:
    path: "{{ mirror_path }}"
    state: directory
    mode: "0755"
  tags:
    - bootstrap_mirror

- name: Set SELinux context for mirror directory
  community.general.sefcontext:
    target: '{{ mirror_path }}(/.*)?'
    setype: public_content_t
    state: present
  register: mirror_set_selinux_context

# need to apply new contexts "now" to prevent potential issues in later tasks
- name: Apply new SELinux file context to filesystem # noqa no-handler no-changed-when
  ansible.builtin.command: restorecon -irv {{ mirror_path }}
  when: mirror_set_selinux_context.changed

- name: Create XFS filesystem for mirror data
  community.general.filesystem:
    state: present
    fstype: xfs
    force: false
    dev: "{{ mirror_dev_fs }}"
  tags:
    - bootstrap_mirror
  when: mirror_create_fs

- name: Add mirror FS to /etc/fstab
  ansible.posix.mount:
    path: "{{ mirror_path }}"
    src: "{{ mirror_dev }}"
    fstype: xfs
    state: mounted
  tags:
    - bootstrap_mirror
  when: mirror_create_fs

# only make sure the rsync *can* succeed, let the cron handle the full sync
- name: Bootstrap mirror # noqa command-instead-of-module ignore-errors
  ansible.builtin.command: "{{ item.bootstrap_command }}"
  args:
    creates: "{{ item.creates }}"
  changed_when: false
  loop: "{{ mirror_repos + (mirror_kitten_repos if mirror_enable_kitten else []) }}"
  tags:
    - bootstrap_mirror
  when: mirror_bootstrap_mirror
  ignore_errors: true

- name: Setup cron for mirror
  ansible.builtin.cron:
    name: "{{ item.mirror_name }}"
    user: "{{ item.rsync_user | default('root') }}"
    minute: "{{ item.rsync_minute }}"
    hour: "{{ item.rsync_hour }}"
    job: "{{ item.rsync_command }}"
    cron_file: "{{ item.rsync_name }}"
    state: "present"
  loop: "{{ mirror_repos + (mirror_kitten_repos if mirror_enable_kitten else []) }}"
  tags:
    - cron
  when: mirror_configure_crons

- name: Customize sysctl
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value | string }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ mirror_sysctl_performance }}"
  tags:
    - sysctl

- name: Certbot
  ansible.builtin.include_tasks: certbot.yml

- name: Ensure Caddy is stopped and disabled
  ansible.builtin.systemd:
    name: caddy.service
    state: stopped
    enabled: false
  failed_when: false
  tags:
    - nginx

- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present
  tags:
    - nginx

- name: Distribute /etc/nginx/nginx.conf
  ansible.builtin.template:
    src: nginx/nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload nginx
  tags:
    - nginx

- name: Check for Let's Encrypt certificate
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}/fullchain.pem
  register: mirror_le_cert_check
  tags:
    - nginx

- name: Distribute mirror vhost configuration
  ansible.builtin.template:
    src: nginx/mirror.conf.j2
    dest: /etc/nginx/conf.d/{{ inventory_hostname }}.conf
    mode: "0644"
    owner: root
    group: root
  vars:
    mirror_ssl_cert_path: "{{ '/etc/letsencrypt/live/' ~ inventory_hostname if mirror_le_cert_check.stat.exists else '/etc/pki/nginx/' ~ inventory_hostname }}"
  notify: Reload nginx
  tags:
    - nginx

- name: Remove default nginx site configuration
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload nginx
  tags:
    - nginx

- name: Start/Enable nginx
  ansible.builtin.systemd:
    name: nginx.service
    state: started
    enabled: true
  tags:
    - nginx

- name: Check for existing certbot-managed certificate
  ansible.builtin.stat:
    path: /etc/letsencrypt/renewal/{{ inventory_hostname }}.conf
  register: mirror_certbot_renewal_check
  tags:
    - certbot

- name: Remove placeholder certificate before certbot provisioning
  ansible.builtin.file:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}
    state: absent
  when: not mirror_certbot_renewal_check.stat.exists
  tags:
    - certbot

- name: Obtain SSL certificate with certbot (HTTP auth) # noqa no-changed-when
  ansible.builtin.shell: >
    certbot certonly
    --webroot -w /var/lib/letsencrypt
    --cert-name {{ inventory_hostname }}
    -d {{ inventory_hostname }}
    -m {{ certbot_email }} --agree-tos -n
    --deploy-hook /etc/letsencrypt/deploy-nginx.sh
  when:
    - not mirror_certbot_renewal_check.stat.exists
    - mirror_certbot_auth | default('http') == 'http'
  failed_when: false
  tags:
    - certbot

- name: Re-check for Let's Encrypt certificate
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ inventory_hostname }}/fullchain.pem
  register: mirror_le_cert_check
  tags:
    - certbot

- name: Update mirror vhost config with real certificate path
  ansible.builtin.template:
    src: nginx/mirror.conf.j2
    dest: /etc/nginx/conf.d/{{ inventory_hostname }}.conf
    mode: "0644"
    owner: root
    group: root
  vars:
    mirror_ssl_cert_path: "{{ '/etc/letsencrypt/live/' ~ inventory_hostname if mirror_le_cert_check.stat.exists else '/etc/pki/nginx/' ~ inventory_hostname }}"
  notify: Reload nginx
  tags:
    - certbot

- name: Install rsyncd
  ansible.builtin.package:
    name: rsync-daemon
    state: present
  when: mirror_rsync_modules

- name: Configure rsyncd
  ansible.builtin.template:
    src: rsyncd.conf.j2
    dest: /etc/rsyncd.conf
    mode: "0644"
  notify: Restart rsyncd
  when: mirror_rsync_modules

- name: Start rsyncd
  ansible.builtin.systemd_service:
    name: rsyncd
    enabled: true
    state: started
  when: mirror_rsync_modules

- name: User
  ansible.builtin.include_tasks: user.yml

- name: Extra tier0 setup
  ansible.builtin.include_tasks: tier0.yml
  when: mirror_tier0
