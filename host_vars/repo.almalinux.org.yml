---
staging: false
hashi_vault_path: "kv/data/infra/{% if staging %}stg/{% endif %}almalinux_repo/repo.almalinux.org"

# we need permissive umask on this server
os_env_umask: "022"

almalinux_repo_deploy_user_private_key: "{{ lookup('community.hashi_vault.hashi_vault', '{{ hashi_vault_path }}:sync_user_private_key',
        token=lookup('env', 'VAULT_TOKEN'), url=secrets_url, errors='warn') }}"
almalinux_repo_deploy_user_pub_key: "{{ lookup('community.hashi_vault.hashi_vault', '{{ hashi_vault_path }}:sync_user_public_key',
        token=lookup('env', 'VAULT_TOKEN'), url=secrets_url, errors='warn') }}"

# 873/tcp is NOT a blanket open. Access is restricted to specific sources via
# `firewalld_extra_rich_rules` below so we can add/remove allowed clients at
# runtime without restarting rsyncd (which would break in-flight pulls).
firewalld_extra_allow_ports: []

# Sources permitted to connect to rsyncd on 873/tcp. Primarily the tier0
# rsync servers (mirrors_tier0 group) plus any ad-hoc clients. Keep IPv4 and
# IPv6 entries in sync. Replace the placeholder addresses with the actual
# public IPs before applying.
almalinux_repo_rsync_allowed_sources:
  # atl.rsync.repo.almalinux.org
  - { family: ipv4, address: "162.255.95.162" }
  - { family: ipv6, address: "2605:7b80:1:2::2" }
  # sea.rsync.repo.almalinux.org
  - { family: ipv4, address: "162.43.206.5" }
  - { family: ipv6, address: "2605:21c0:1000:4e::5" }
  # gra.rsync.repo.almalinux.org
  - { family: ipv4, address: "91.134.76.173" }
  - { family: ipv6, address: "2001:41d0:348:ad00::1" }

# Expand allowed-sources into firewalld rich rules consumed by
# roles/common/tasks/firewalld.yml. One tcp/873 accept rule per source.
# (Ansible's Jinja doesn't accept inline list comprehensions, hence the
# set/append loop pattern.)
firewalld_extra_rich_rules: >-
  {%- set rules = [] -%}
  {%- for s in almalinux_repo_rsync_allowed_sources -%}
  {%- set _ = rules.append(
    'rule family="' ~ s.family ~ '" source address="' ~ s.address ~
    '" port protocol="tcp" port="873" accept') -%}
  {%- endfor -%}
  {{ rules }}

# rsyncd modules served from this host. Module names must match the `src`
# values in the tier0 catalog (group_vars/mirrors_tier0.yml) so the
# mirror-pull script on each rsync server resolves the right path. Module
# name need not match the on-disk directory name (e.g. almalinux-elevate
# serves /repo/elevate, vault serves /repo/vault which is the HDD-backed
# subtree).
almalinux_repo_rsync_modules:
  almalinux:
    path: "{{ almalinux_repo_dir }}/almalinux"
    comment: AlmaLinux repository
  almalinux-kitten:
    path: "{{ almalinux_repo_dir }}/almalinux-kitten"
    comment: AlmaLinux Kitten repository
  almalinux-epel:
    path: "{{ almalinux_repo_dir }}/almalinux-epel"
    comment: AlmaLinux EPEL repository
  almalinux-elevate:
    path: "{{ almalinux_repo_dir }}/elevate"
    comment: AlmaLinux ELevate repository
  vault:
    path: "{{ almalinux_repo_dir }}/vault"
    comment: AlmaLinux vault (historical releases)

# Fan-out trigger: repo-alma-sync.sh SSHes to each host in the mirrors_tier0
# inventory group to kick mirror-pull.service after ALBS pushes new content.
almalinux_repo_sync_trigger_enabled: true

almalinux_repo_ssh_authorized_keys:
  # ALBS
  - ssh-rsa  pulp@albs-pulp.almalinux.org # noqa yaml[line-length]

almalinux_repo_dirs:
  - repo: almalinux
    type: nvme
  - repo: almalinux-epel
    type: nvme
  - repo: almalinux-kitten
    type: nvme
  - repo: almalinux-nvidia
    type: nvme
  - repo: backports
    type: nvme
  - repo: build_system
    type: nvme
  - repo: development
    type: nvme
  - repo: elevate
    type: nvme
  - repo: rpi
    type: nvme
  - repo: security
    type: nvme
  - repo: vault
    type: hdd
  - repo: wsl
    type: nvme

almalinux_repo_route53_access_key: "{{ lookup('community.hashi_vault.hashi_vault', '{{ hashi_vault_path }}:route53_access_key',
        token=lookup('env', 'VAULT_TOKEN'), url=secrets_url, errors='warn') }}"
almalinux_repo_route53_secret_key: "{{ lookup('community.hashi_vault.hashi_vault', '{{ hashi_vault_path }}:route53_secret_key',
        token=lookup('env', 'VAULT_TOKEN'), url=secrets_url, errors='warn') }}"
almalinux_repo_cloudflare_api_token: "{{ lookup('community.hashi_vault.hashi_vault', '{{ hashi_vault_path }}:cloudflare_api_token',
        token=lookup('env', 'VAULT_TOKEN'), url=secrets_url, errors='warn') }}"

# almalinux_repo_certbot_default_auth: dns_route53

almalinux_repo_vhosts:
  - name: raw.repo.almalinux.org
    root: /repo
    autoindex: true
    enable_http: true
    redirects:
      - location: /vault/
        strip_prefix: /vault
        target_host: vault.almalinux.org
      - location: /almalinux-kitten/
        strip_prefix: /almalinux-kitten
        target_host: kitten.repo.almalinux.org
      - location: /security/
        strip_prefix: /security
        target_host: security.almalinux.org
      - location: /nvidia/
        strip_prefix: /nvidia
        target_host: nvidia.repo.almalinux.org
      # Legacy CUDA paths: previously published under the mainline almalinux repo
      # layout (/almalinux/<ver>/nvidia/[<arch>/[os/]]...) before being moved to
      # the dedicated almalinux-nvidia repo. Maintain these redirects indefinitely.
      # The first location handles the full /<arch>/os/<rest> form and drops the
      # `os` segment; the second catches anything else under /<ver>/nvidia/
      # (including bare /nvidia/, /nvidia/<arch>/, debug/, source/, etc.).
      - raw: |
          location ~ ^/almalinux/([^/]+)/nvidia/([^/]+)/os(/.*)?$ {
              return 301 $scheme://nvidia.repo.almalinux.org/cuda/$1/$2$3;
          }
          location ~ ^/almalinux/([^/]+)/nvidia(/.*)?$ {
              return 301 $scheme://nvidia.repo.almalinux.org/cuda/$1$2;
          }
  - name: errata.almalinux.org
    root: /repo
    expires: errata
  - name: kitten.repo.almalinux.org
    root: /repo/almalinux-kitten
    autoindex: true
    enable_http: true
  - name: epel.repo.almalinux.org
    root: /repo/almalinux-epel
    autoindex: true
    enable_http: true
  - name: security.almalinux.org
    root: /repo/security
    autoindex: true
    enable_http: true
    expires: errata
  - name: raw.vault.almalinux.org
    root: /repo/vault
    autoindex: true
    enable_http: true
    redirects:
      - location: /almalinux-epel/
        strip_prefix: /almalinux-epel
        target_host: epel.vault.almalinux.org
  - name: vault.almalinux.org
    root: /repo/vault
    autoindex: true
    enable_http: true
    redirects:
      - location: /almalinux-epel/
        strip_prefix: /almalinux-epel
        target_host: epel.vault.almalinux.org
  - name: epel.vault.almalinux.org
    root: /repo/vault/almalinux-epel
    autoindex: true
    enable_http: true
  - name: kitten.vault.almalinux.org
    root: /repo/vault
    autoindex: true
    enable_http: true
  - name: wsl.almalinux.org
    root: /repo/wsl
    autoindex: true
    enable_http: true
  - name: raw.nvidia.repo.almalinux.org
    root: /repo/almalinux-nvidia
    autoindex: true
    enable_http: true
    # originally we deployed the cuda repos to the docroot, but now we use a subdirectory
    # these redirects should be maintained indefitely
    redirects:
      - location: /10-kitten
        target_path: /cuda/10
      - location: /10
        target_path: /cuda/10
      - location: /9
        target_path: /cuda/9
